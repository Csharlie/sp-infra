# Docker base configuration for Spektra WordPress development.
#
# Status: PREPARED — not primary. WAMP is the reference local runtime (DR-004).
# Use this when WAMP is not available or for CI/CD environments.
#
# Usage:
#   cp .env.example .env   # fill in credentials
#   docker compose up -d
#   docker compose run --rm wpcli core install ...
#
# Plugin mount: sp-infra/plugin/spektra-api → bind mount (not symlink)
# Client overlay: add bind mount to client's infra/ in override file

services:
  wordpress:
    image: wordpress:6.7-php8.3-apache
    ports: ["${WP_PORT:-8080}:80"]
    environment:
      WORDPRESS_DB_HOST: mariadb:3306
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE}
      WORDPRESS_DB_USER: ${MYSQL_USER}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}
      WORDPRESS_DEBUG: "true"
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_DEBUG_LOG', true);
        define('DISALLOW_FILE_EDIT', true);
    volumes:
      - wp-data:/var/www/html
      - ../plugin/spektra-api:/var/www/html/wp-content/plugins/spektra-api
      - wp-uploads:/var/www/html/wp-content/uploads
    depends_on:
      mariadb: { condition: service_healthy }

  mariadb:
    image: mariadb:11.4
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes: [db-data:/var/lib/mysql]
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 5

  wpcli:
    image: wordpress:cli-php8.3
    volumes:
      - wp-data:/var/www/html
      - wp-uploads:/var/www/html/wp-content/uploads
      - ../seed:/seed
    depends_on: [wordpress]
    entrypoint: ["wp", "--allow-root"]
    profiles: ["cli"]

volumes:
  wp-data:
  db-data:
  wp-uploads:
